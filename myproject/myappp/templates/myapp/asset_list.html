<!DOCTYPE html>
<html>

<head>

<title>
Asset Inventory
</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>


<body class="bg-light">


<nav class="navbar navbar-dark bg-success">

<div class="container">

<h4 class="text-white">
Asset Inventory
</h4>


<a href="{% url 'asset_manager_dashboard' %}"
class="btn btn-light">

Back Dashboard

</a>


</div>

</nav>




<div class="container mt-5">


<div class="card shadow">


<div class="card-body">


<h3>
All Assets
</h3>


<hr>


<table class="table table-bordered">


<thead class="table-success">


<tr>

<th>
Asset Code
</th>


<th>
Asset Name
</th>


<th>
Category
</th>


<th>
Status
</th>


<th>
Condition
</th>


<th>
Location
</th>


</tr>


</thead>



<tbody>


{% for a in assets %}


<tr>


<td>
{{a.asset_code}}
</td>


<td>
{{a.asset_name}}
</td>


<td>
{{a.category.category_name}}
</td>


<td>

{{a.asset_status}}

</td>


<td>

{{a.condition}}

</td>


<td>

{{a.location}}

</td>


</tr>


{% empty %}


<tr>

<td colspan="6" class="text-center">

No Assets Available

</td>

</tr>


{% endfor %}



</tbody>


</table>


</div>

</div>


</div>


</body>

</html>
