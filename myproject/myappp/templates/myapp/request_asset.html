<!DOCTYPE html>
<html>

<head>

<title>Request Asset</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>


<body class="bg-light">


<nav class="navbar navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand">

AssetFlow ERP

</a>


<a href="{% url 'employee_dashboard' %}" class="btn btn-light">

Dashboard

</a>

</div>

</nav>



<div class="container mt-5">


<div class="card shadow">


<div class="card-header bg-primary text-white">

<h3>

Request Asset

</h3>

</div>



<div class="card-body">


{% if msg %}

<div class="alert alert-success">

{{msg}}

</div>

{% endif %}



<form method="POST">

{% csrf_token %}



<div class="mb-3">

<label class="form-label">

Asset Name

</label>


<input type="text"
name="asset_name"
class="form-control"
placeholder="Laptop, Mouse, Keyboard..."
required>


</div>



<div class="mb-3">

<label class="form-label">

Reason

</label>


<textarea

name="reason"

class="form-control"

rows="5"

placeholder="Why do you need this asset?"

required>

</textarea>


</div>



<button class="btn btn-primary">

Send Request

</button>


</form>


</div>


</div>


</div>


</body>

</html>
