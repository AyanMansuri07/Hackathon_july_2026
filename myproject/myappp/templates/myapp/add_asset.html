<!DOCTYPE html>
<html>

<head>

<title>Add Asset</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


</head>


<body class="bg-light">


<div class="container mt-5">


<div class="card shadow">


<div class="card-header bg-success text-white">

<h3>Add New Asset</h3>

</div>



<div class="card-body">


<form method="POST" enctype="multipart/form-data">

{% csrf_token %}



<div class="row">


<div class="col-md-6 mb-3">

<label>Asset Name</label>

<input 
type="text"
name="asset_name"
class="form-control"
required>

</div>



<div class="col-md-6 mb-3">

<label>Asset Code</label>

<input 
type="text"
name="asset_code"
class="form-control"
required>

</div>




<div class="col-md-6 mb-3">


<label>Category</label>


<select name="category" class="form-control">


<option>Select Category</option>


{% for c in categories %}

<option value="{{c.id}}">

{{c.category_name}}

</option>


{% endfor %}


</select>


</div>





<div class="col-md-6 mb-3">

<label>Brand</label>

<input 
type="text"
name="brand"
class="form-control">

</div>






<div class="col-md-6 mb-3">

<label>Model Number</label>

<input 
type="text"
name="model_number"
class="form-control">

</div>





<div class="col-md-6 mb-3">

<label>Serial Number</label>

<input 
type="text"
name="serial_number"
class="form-control">

</div>





<div class="col-md-6 mb-3">

<label>Purchase Date</label>

<input 
type="date"
name="purchase_date"
class="form-control">

</div>





<div class="col-md-6 mb-3">

<label>Purchase Price</label>

<input 
type="number"
name="purchase_price"
class="form-control">

</div>





<div class="col-md-6 mb-3">

<label>Warranty Expiry</label>

<input 
type="date"
name="warranty_expiry"
class="form-control">

</div>





<div class="col-md-6 mb-3">


<label>Status</label>


<select name="asset_status" class="form-control">


<option value="AVAILABLE">
Available
</option>


<option value="ALLOCATED">
Allocated
</option>


<option value="MAINTENANCE">
Maintenance
</option>


<option value="DAMAGED">
Damaged
</option>


</select>


</div>






<div class="col-md-6 mb-3">


<label>Condition</label>


<select name="condition" class="form-control">


<option value="NEW">
New
</option>


<option value="GOOD">
Good
</option>


<option value="USED">
Used
</option>


<option value="DAMAGED">
Damaged
</option>


</select>


</div>






<div class="col-md-6 mb-3">


<label>Location</label>


<input
type="text"
name="location"
class="form-control">


</div>






<div class="col-md-12 mb-3">


<label>Description</label>


<textarea
name="description"
class="form-control"></textarea>


</div>










<button class="btn btn-success">

Save Asset

</button>


<a href="{% url 'asset_manager_dashboard' %}"
class="btn btn-secondary">

Back

</a>



</form>



</div>


</div>


</div>



</body>

</html>
