<!DOCTYPE html>
<html>

<head>

<title>
Asset Allocation
</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">


</head>


<body class="bg-light">


<nav class="navbar navbar-dark bg-success">

<div class="container">

<h4 class="text-white">
Asset Allocation
</h4>


<a href="{% url 'asset_manager_dashboard' %}"
class="btn btn-light">

Back

</a>


</div>

</nav>



<div class="container mt-5">


<div class="card shadow">


<div class="card-body">


<h3>
Allocate Asset To Employee
</h3>


<hr>


<form method="POST">

{% csrf_token %}



<label>
Select Asset
</label>


<select name="asset"
class="form-control mb-3"
required>


<option value="">
Select Asset
</option>


{% for a in assets %}

<option value="{{a.id}}">

{{a.asset_name}} 
({{a.asset_code}})

</option>


{% endfor %}


</select>




<label>
Select Employee
</label>


<select name="employee"
class="form-control mb-3"
required>


<option value="">
Select Employee
</option>


{% for e in employees %}


<option value="{{e.id}}">

{{e.first_name}}
{{e.last_name}}
-
{{e.employee_code}}

</option>


{% endfor %}


</select>




<label>
Remarks
</label>


<textarea

name="remarks"

class="form-control mb-3"

placeholder="Optional remarks">

</textarea>



<button class="btn btn-success">

Allocate Asset

</button>


</form>


</div>

</div>


</div>


</body>

</html>
