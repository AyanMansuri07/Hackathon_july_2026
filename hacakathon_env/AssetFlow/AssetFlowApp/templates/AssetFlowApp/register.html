{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AssetFlow ERP | Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #F9FAFB;
            font-family: 'Inter', Arial, Helvetica, sans-serif;
        }

        .register-card {
            max-width: 850px;
            margin: 40px auto;
            background: #FFFFFF;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 4px 12px rgba(0,0,0,.05);
            border: 1px solid #E5E7EB;
        }

        .title {
            text-align: center;
            margin-bottom: 30px;
            color: #111827;
            font-weight: bold;
        }

        .btn-register {
            width: 100%;
            font-size: 18px;
            background-color: #2563EB;
            border-color: #2563EB;
            border-radius: 8px;
        }
        
        .btn-register:hover {
            background-color: #1D4ED8;
            border-color: #1D4ED8;
        }
        
        a {
            color: #2563EB;
        }
        
        a:hover {
            color: #1D4ED8;
        }
    </style>

</head>

<body>

<div class="container">

<div class="register-card">

<h2 class="title">Asset Management ERP</h2>

<h5 class="text-center mb-4">Employee Registration</h5>

{% if e_msg %}

<div class="alert alert-danger">

{{e_msg}}

</div>

{% endif %}

{% if s_msg %}

<div class="alert alert-success">

{{s_msg}}

</div>

{% endif %}

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">First Name</label>

<input

type="text"

name="first_name"

class="form-control"

required

pattern="[A-Za-z ]{2,30}"

title="Only letters allowed (2-30 characters).">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Last Name</label>

<input

type="text"

name="last_name"

class="form-control"

required

pattern="[A-Za-z ]{2,30}"

title="Only letters allowed (2-30 characters).">

</div>

</div>

<div class="mb-3">

<label class="form-label">Email Address</label>

<input

type="email"

name="email"

class="form-control"

required>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Contact Number</label>

<input

type="text"

name="contact"

class="form-control"

required

maxlength="10"

pattern="[6-9]{1}[0-9]{9}"

title="Enter valid 10 digit mobile number">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Employee Code</label>

<input

type="text"

name="employee_code"

class="form-control"

required

placeholder="EMP001"

pattern="[A-Za-z0-9]{3,15}"

title="Only letters and numbers">

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

    <label class="form-label">Department</label>

    <select name="department" class="form-select" required>

        <option value="">------ Select Department ------</option>

        {% for dept in departments %}

            <option value="{{ dept.id }}">
                {{ dept.department_name }}
            </option>

        {% empty %}

            <option value="" disabled>
                No Department Found
            </option>

        {% endfor %}

    </select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Role</label>

<select

name="role"

class="form-select"

required>

<option value="">------ Select Role ------</option>

<option value="EMPLOYEE">Employee</option>

<option value="ASSET_MANAGER">Asset Manager</option>

<option value="DEPARTMENT_HEAD">Department Head</option>

<option value="ADMIN">Admin</option>

</select>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">Password</label>

<input

type="password"

name="password"

id="password"

class="form-control"

required

minlength="8"

pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$"

title="Minimum 8 characters with uppercase, lowercase, number and special character">

</div>

<div class="col-md-6 mb-3">

<label class="form-label">Confirm Password</label>

<input

type="password"

name="confirm_password"

id="confirm_password"

class="form-control"

required>

</div>

</div>

<div class="form-check mb-3">

<input

class="form-check-input"

type="checkbox"

onclick="showPassword()">

<label class="form-check-label">

Show Password

</label>

</div>

<button

type="submit"

class="btn btn-primary btn-register">

Register

</button>

</form>

<hr>

<p class="text-center">

Already have an account?

<a href="{% url 'login' %}">

Login Here

</a>

</p>

</div>

</div>

<script>

function showPassword(){

let x=document.getElementById("password");
let y=document.getElementById("confirm_password");

if(x.type==="password"){

x.type="text";
y.type="text";

}
else{

x.type="password";
y.type="password";

}

}

document.querySelector("form").addEventListener("submit",function(e){

let p=document.getElementById("password").value;
let cp=document.getElementById("confirm_password").value;

if(p!=cp){

alert("Password and Confirm Password must be same.");

e.preventDefault();

}

});

</script>

</body>
</html>
