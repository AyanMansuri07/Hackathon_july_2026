{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AssetFlow ERP | Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#eef2f7;
            font-family:Arial, Helvetica, sans-serif;
        }

        .login-card{
            max-width:500px;
            margin:70px auto;
            background:white;
            padding:35px;
            border-radius:15px;
            box-shadow:0px 0px 20px rgba(0,0,0,.12);
        }

        h2{
            text-align:center;
            color:#0d6efd;
            font-weight:bold;
        }

        h5{
            text-align:center;
            color:gray;
            margin-bottom:25px;
        }

        .btn-login{
            width:100%;
            font-size:18px;
        }

    </style>

</head>

<body>

<div class="container">

<div class="login-card">

<h2>AssetFlow ERP</h2>

<h5>Login to Continue</h5>

{% if s_msg %}

<div class="alert alert-success">

{{ s_msg }}

</div>

{% endif %}

{% if e_msg %}

<div class="alert alert-danger">

{{ e_msg }}

</div>

{% endif %}

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">

Email Address

</label>

<input
type="email"
name="email"
class="form-control"
placeholder="Enter Email"
required>

</div>

<div class="mb-3">

<label class="form-label">

Password

</label>

<input
type="password"
name="password"
id="password"
class="form-control"
placeholder="Enter Password"
required>

</div>

<div class="form-check mb-3">

<input
class="form-check-input"
type="checkbox"
onclick="showPassword()"
id="showpass">

<label class="form-check-label" for="showpass">

Show Password

</label>

</div>

<div class="d-flex justify-content-between mb-3">

<div>

<input
type="checkbox"
class="form-check-input"
id="remember">

<label class="form-check-label" for="remember">

Remember Me

</label>

</div>

<div>

<a href="#">

Forgot Password?

</a>

</div>

</div>

<button
type="submit"
class="btn btn-primary btn-login">

Login

</button>

</form>

<hr>

<p class="text-center">

Don't have an account?

<a href="{% url 'register' %}">

Register Here

</a>

</p>

</div>

</div>

<script>

function showPassword(){

var x=document.getElementById("password");

if(x.type==="password"){

x.type="text";

}
else{

x.type="password";

}

}

</script>

</body>
</html>
