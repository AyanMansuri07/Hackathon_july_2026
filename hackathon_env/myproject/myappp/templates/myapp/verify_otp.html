{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AssetFlow ERP | Verify OTP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#eef2f7;
            font-family:Arial, Helvetica, sans-serif;
        }

        .otp-card{
            max-width:500px;
            margin:90px auto;
            background:#fff;
            padding:35px;
            border-radius:15px;
            box-shadow:0px 0px 20px rgba(0,0,0,.12);
        }

        h2{
            text-align:center;
            color:#0d6efd;
            margin-bottom:10px;
        }

        p{
            text-align:center;
            color:gray;
            margin-bottom:25px;
        }

        .btn-verify{
            width:100%;
            font-size:18px;
        }

        .otp-box{
            letter-spacing:8px;
            text-align:center;
            font-size:22px;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="otp-card">

        <h2>Email Verification</h2>

        <p>
            Enter the 6-digit OTP sent to your registered email.
        </p>

        {% if e_msg %}
        <div class="alert alert-danger">
            {{ e_msg }}
        </div>
        {% endif %}

        {% if s_msg %}
        <div class="alert alert-success">
            {{ s_msg }}
        </div>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="mb-4">

                <label class="form-label">
                    Enter OTP
                </label>

                <input
                    type="text"
                    name="otp"
                    class="form-control otp-box"
                    maxlength="6"
                    minlength="6"
                    pattern="[0-9]{6}"
                    title="OTP must contain exactly 6 digits."
                    placeholder="000000"
                    required>

            </div>

            <button
                type="submit"
                class="btn btn-primary btn-verify">

                Verify OTP

            </button>

        </form>

        <hr>

        <div class="text-center">

            <p class="mb-2">
                Didn't receive the OTP?
            </p>

            <a href="{% url 'register' %}" class="btn btn-outline-secondary">

                Register Again

            </a>

            {% comment %} <!-- Later you can replace this button with:
            <a href="{% url 'resend_otp' %}" class="btn btn-warning">
                Resend OTP
            </a>
            --> {% endcomment %}

        </div>

    </div>

</div>

</body>
</html>
